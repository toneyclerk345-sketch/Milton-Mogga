                    Previous
                </button>
                <button type="button" id="nextBtn" onclick="navigateStep(1)" class="px-6 py-2 rounded-lg text-sm font-semibold bg-teal-600 hover:bg-teal-700 text-white transition-all shadow-md">
                    Next
                </button>
                <button type="submit" id="submitBtn" class="hidden px-6 py-2 rounded-lg text-sm font-bold bg-green-600 hover:bg-green-700 text-white transition-all shadow-md">
