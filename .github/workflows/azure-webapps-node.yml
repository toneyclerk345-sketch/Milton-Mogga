    <script>
        let currentStep = 1;
        const totalSteps = 4;

        // Toggles local free text input areas
        function toggleSpecify(elementId, shouldShow) {
            const el = document.getElementById(elementId);
            if (shouldShow) {
                el.classList.remove('hidden');
                el.setAttribute('required', 'true');
            } else {
                el.classList.add('hidden');
                el.removeAttribute('required');
                el.value = '';
            }
        }

        // Toggles nested sub-panels conditionally based on parent inputs
        function toggleConditional(panelId, shouldShow) {
            const panel = document.getElementById(panelId);
            if (shouldShow) {
                panel.classList.remove('hidden');
            } else {
                panel.classList.add('hidden');
                // Uncheck inner checked options and clear inner labels to clean up dataset
                panel.querySelectorAll('input[type="checkbox"]').forEach(i => i.checked = false);
                panel.querySelectorAll('input[type="text"]').forEach(i => {
                    i.value = '';
                    i.classList.add('hidden');
                });
            }
        }

        // Controls field evaluation dynamically page-by-page inside the wizard architecture
        function navigateStep(direction) {
            if (direction === 1 && !validateCurrentStep()) {
                alert("Please answer all required questions in this section before continuing.");
                return;
            }
            document.getElementById(`step${currentStep}`).classList.remove('active');
            currentStep += direction;
            document.getElementById(`step${currentStep}`).classList.add('active');
            updateUI();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Validates constraints programmatically before progress updates occur
        function validateCurrentStep() {
            const activeView = document.getElementById(`step${currentStep}`);
            const inputs = activeView.querySelectorAll('[required]');
            let valid = true;
            inputs.forEach(input => {
                if (input.type === 'radio') {
                    const name = input.name;
                    const group = activeView.querySelectorAll(`input[name="${name}"]:checked`);
                    if (group.length === 0) valid = false;
                } else if (!input.value.trim()) {
                    valid = false;
                }
            });
            return valid;
        }

        // Keeps track of steps, updates the progress bar, and swaps active buttons
        function updateUI() {
            // Update Navigation Buttons visibility
            document.getElementById('prevBtn').style.visibility = currentStep === 1 ? 'hidden' : 'visible';
            
            if (currentStep === totalSteps) {
                document.getElementById('nextBtn').classList.add('hidden');
                document.getElementById('submitBtn').classList.remove('hidden');
            } else {
                document.getElementById('nextBtn').classList.remove('hidden');
                document.getElementById('submitBtn').classList.add('hidden');
            }
            // Progress Bar status synchronization
            const pct = (currentStep / totalSteps) * 100;
            document.getElementById('progressBar').style.width = `${pct}%`;
            // Active tracking color label state mappings
            const codes = ['A', 'B', 'C', 'D'];
            codes.forEach((c, idx) => {
                const el = document.getElementById(`prog-${c}`);
                if (idx + 1 <= currentStep) {
                    el.classList.add('text-teal-700', 'font-bold');
                } else {
                    el.classList.remove('text-teal-700', 'font-bold');
                }
            });
        }

        // Final Interception before standard external API email post takes place
        function handleFormSubmit(event) {
            const date = document.getElementById('survey_date').value;
            const respNo = document.getElementById('respondent_no').value;
            
            if (!date || !respNo) {
                event.preventDefault();
                alert("Please fill in the collection Date and Respondent Number at the top.");
                return;
            }
            
            // Let the standard action form submit post process cleanly over to the target email
            alert(`Sending survey data for Respondent No: ${respNo} directly to toneyclerk345@gmail.com...`);
        }
    </script>
</body>
